<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor</title>
</head>

<body>
    <!-- <a href="">link name</a> -->
    <!-- <p></p> -->
    <h2>This is the Anchor tag</h2>
    <a href="https://www.w3schools.com/html/default.asp" target="_blank">HTML Tutorial</a>
    <br>
    <!-- opening links in new tab  -->
    <a href="https://www.w3schools.com/html/default.asp" target="_blank">HTML Tutorial</a>
    <br>
    <!-- linking to email addresses and phone number -->
    <a href="mailto:example@xyz.com">send mail</a>
    <br>
    <a href="tel: 012345678910">012345678910</a>
    <br>
    <!-- creating internal page anchors -->
    <a href="#section1">Go to Section 1</a>

</body>

</html>
