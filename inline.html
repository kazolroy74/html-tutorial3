<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Elements</title>
</head>

<body>
    <!-- inline elements span, a, img, strong, em, br, i, input  -->
    <p>This is a <span>span element</span>used for styling text.</p>
    <p><strong>Strong text</strong> and <b>bold text</b>are inline elements.
        <em>emphasized text</em> and <i>italic text</i> are also inline.
    </p>
    <form>
        <label>Name:</label>
        <input type="text" placeholder="Enter your name">
    </form>
</body>

</html>
