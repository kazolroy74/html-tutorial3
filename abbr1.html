<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABBR Tag</title>
</head>
<body>
    <style>
        abbr{
            color: #007BFF;
            font-weight: bold;
            font-size: 1.1em;
            border-bottom: 1px dashed #007BFF;
        }
        abbr:hover{
            text-decoration: none;
            color: #0056b3;
            cursor: pointer;
        }
    </style>
    <p>
        <abbr title="Hpter Text Markup Language">HTML</abbr>
        is used to create the sturcture of a web page.
    </p>
</body>
</html>
