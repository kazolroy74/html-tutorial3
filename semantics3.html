<!-- figure and figcaption -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure and Figcaption </title>
    <style>
        h2 {
            color: #006400;
            font-size: 50px;
            margin-bottom: 0px;
        }

        p {
            font-size: 25px;
            margin-top: 0px;
        }
    </style>
</head>

<body>
    <h2>Welcome to our Website</h2>
    <figure>
        <img src="./weblogo.avif" alt="weblogo" style="width: 10%;">
        <figcaption>WebSite logo</figcaption>
    </figure>
</body>

</html>
